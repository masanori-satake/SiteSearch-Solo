name: "リリース: 拡張機能パッケージの公開 (Release: Publish Extension Packages)"

on:
  push:
    tags:
      - 'v*.*.*' # セマンティックバージョニングのタグをトリガーとする
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v0.26.1)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Releaseの作成およびアセットのアップロードに必須

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json', '.github/workflows/release_extension_packages.yml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Python Playwright
        run: pip install playwright==1.58.0

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Install Node.js Playwright Browsers
        run: npx playwright install chromium

      - name: Build packages
        run: npm run build

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: releases/*.zip
