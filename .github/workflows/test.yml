name: "テスト: 機能整合性とデグレード検知 (Test: Functional Integrity and Regression Detection)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/app/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'jest.config.js'
      - 'playwright.config.js'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: ユニット & E2E テスト (Unit & E2E Test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json', '.github/workflows/test.yml') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Python Playwright
      run: pip install playwright==1.58.0

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: python -m playwright install chromium --with-deps

    - name: Install Playwright Dependencies (if cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: python -m playwright install-deps chromium

    - name: Install Node.js Playwright Browsers
      run: npx playwright install chromium

    - name: Generate Icons
      run: python scripts/generate_png_icons.py

    - name: Run Unit Tests
      run: npm run test

    - name: Upload coverage reports to Codecov (Standard Actions)
      if: always()
      run: |
        echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        npx jest --coverage --coverageReporter=text-summary | grep -A 10 "Coverage summary" >> $GITHUB_STEP_SUMMARY || true

    - name: Run E2E Tests
      run: xvfb-run npm run test:e2e

    - name: Upload Test Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
