name: "監査: 透明性とセキュリティ (Audit: Transparency and Security)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'projects/**'
      - 'README.md'
      - 'SECURITY.md'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  integrity-and-oss:
    name: コード整合性とOSS監査 (Code Integrity and OSS Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45
      with:
        files: |
          scripts/**
          package.json
          package-lock.json
          projects/app/**
          README.md

    - name: 1. ルートディレクトリのクリーンネス確認 (Root Directory Cleanliness)
      run: python scripts/check_root_files.py

    - name: 2. プロジェクトポリシー確認 (Project Policy Guard)
      run: python scripts/verify_project_policies.py

    - name: 3. PRコメント使用言語確認 (PR Language Check)
      if: github.event_name == 'pull_request'
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        printf '%s' "$PR_TITLE" | python scripts/language_check.py
        if [ -n "$PR_BODY" ]; then
          printf '%s' "$PR_BODY" | python scripts/language_check.py
        else
          echo "PR body is empty. Skipping description language check."
        fi

    - name: 4. バージョンの一貫性確認 (Version Consistency)
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: python scripts/check_version.py

    - name: 5. バージョン影響評価 (Version Impact)
      if: (github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true') || github.event_name == 'workflow_dispatch'
      run: python scripts/verify_version_impact.py

    - name: 6. 外部OSS依存関係なしの確認 (No Production Dependencies)
      id: verify-no-deps
      run: python scripts/audit_production_dependencies.py

    - name: 7. 透明性レポートのサマリー作成 (Transparency Report Summary)
      if: always()
      run: |
        echo "### Transparency Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.verify-no-deps.outcome }}" == "success" ]; then
          echo "- Pure Vanilla JS policy: passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Pure Vanilla JS policy: failed" >> $GITHUB_STEP_SUMMARY
        fi
        echo "- Root cleanliness / policy / version checks: completed" >> $GITHUB_STEP_SUMMARY

  osv-scan:
    name: 8. Google OSV-Scanner による脆弱性検査 (Vulnerability Scan)
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.1"
    with:
      scan-args: |-
        --recursive
        ./
        ./package.json
